# pytest configuration for FraudGuard 360
[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --cov=api-gateway
    --cov=ml-service
    --cov=shared
    --cov-report=html:coverage_reports/html
    --cov-report=xml:coverage_reports/coverage.xml
    --cov-report=term-missing
    --cov-fail-under=70
    --html=test_reports/pytest_report.html
    --self-contained-html
    --json-report
    --json-report-file=test_reports/pytest_results.json

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    security: Security tests
    slow: Slow tests (may take more than 10 seconds)
    requires_services: Tests that require external services
    requires_data: Tests that require test data files

# Minimum Python version
minversion = 3.8

# Test timeout (in seconds)
timeout = 300

# Parallel execution
# Uncomment to run tests in parallel (requires pytest-xdist)
# addopts = -n auto

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:sklearn.*
    ignore::FutureWarning:sklearn.*

# Django-like test database configuration (if needed)
# DJANGO_SETTINGS_MODULE = fraudguard.settings.test

# Environment variables for testing
env =
    TESTING = true
    API_GATEWAY_URL = http://localhost:8000
    ML_SERVICE_URL = http://localhost:8003
    FRONTEND_URL = http://localhost:3000
    REDIS_HOST = localhost
    REDIS_PORT = 6379
    POSTGRES_HOST = localhost
    POSTGRES_PORT = 5432
    POSTGRES_DB = fraudguard_test
    POSTGRES_USER = test_user
    POSTGRES_PASSWORD = test_password
    NEO4J_URI = bolt://localhost:7687
    NEO4J_USER = neo4j
    NEO4J_PASSWORD = test_password
    KAFKA_SERVERS = localhost:9092
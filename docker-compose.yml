version: '3.8'
services:
  kafka:
    image: confluentinc/cp-kafka:7.0.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
  neo4j:
    image: neo4j:5.15
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - ./neo4j/data:/data
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"
    depends_on:
      - neo4j
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
  flink-jobmanager:
    image: apache/flink:1.18
    command: jobmanager
    ports:
      - "6123:6123"
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
  flink-taskmanager:
    image: apache/flink:1.18
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager\ntaskmanager.numberOfTaskSlots: 1"
    scale: 1

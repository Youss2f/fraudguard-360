# FraudGuard 360 - Alerting Rules Configuration
# Comprehensive alerting for fraud detection, system health, and business metrics

groups:
  - name: fraudguard.fraud_detection
    rules:
      # High fraud detection rate alert
      - alert: HighFraudDetectionRate
        expr: rate(fraudguard_fraud_detections_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          team: fraud_detection
          service: fraudguard
        annotations:
          summary: "High fraud detection rate detected"
          description: "Fraud detection rate is {{ $value }} per second, which is above normal threshold"
          runbook_url: "https://wiki.company.com/runbooks/fraudguard/high-fraud-rate"
          dashboard_url: "http://grafana:3000/d/fraud-detection"

      # Critical fraud detection accuracy drop
      - alert: FraudDetectionAccuracyDrop
        expr: fraudguard_model_accuracy_score < 0.85
        for: 5m
        labels:
          severity: critical
          team: ml_ops
          service: fraudguard
        annotations:
          summary: "Fraud detection model accuracy critically low"
          description: "Model accuracy is {{ $value }}, below critical threshold of 0.85"
          runbook_url: "https://wiki.company.com/runbooks/fraudguard/model-accuracy"
          action_required: "Investigate model drift and consider retraining"

      # High false positive rate
      - alert: HighFalsePositiveRate
        expr: fraudguard_false_positive_rate > 0.05
        for: 10m
        labels:
          severity: warning
          team: fraud_detection
          service: fraudguard
        annotations:
          summary: "High false positive rate in fraud detection"
          description: "False positive rate is {{ $value }}, exceeding acceptable threshold"
          impact: "May impact customer experience with legitimate transactions"

      # Model inference latency spike
      - alert: ModelInferenceLatencyHigh
        expr: histogram_quantile(0.95, rate(fraudguard_model_inference_duration_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
          team: ml_ops
          service: ml-service
        annotations:
          summary: "Model inference latency is high"
          description: "95th percentile inference latency is {{ $value }}s, above 2s threshold"
          impact: "May cause API timeouts and poor user experience"

  - name: fraudguard.system_health
    rules:
      # Service down alert
      - alert: ServiceDown
        expr: up{job=~"fraudguard-.*"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
          service: "{{ $labels.job }}"
        annotations:
          summary: "FraudGuard service is down"
          description: "Service {{ $labels.job }} on {{ $labels.instance }} is down"
          runbook_url: "https://wiki.company.com/runbooks/fraudguard/service-down"
          action_required: "Immediate investigation required"

      # High API response time
      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, rate(fraudguard_api_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: platform
          service: api-gateway
        annotations:
          summary: "High API response time"
          description: "95th percentile API response time is {{ $value }}s"
          threshold: "1 second"
          impact: "Degraded user experience"

      # High error rate
      - alert: HighErrorRate
        expr: rate(fraudguard_api_requests_total{status=~"5.."}[5m]) / rate(fraudguard_api_requests_total[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
          team: platform
          service: api-gateway
        annotations:
          summary: "High API error rate"
          description: "API error rate is {{ $value | humanizePercentage }}"
          threshold: "5%"
          action_required: "Check logs and investigate root cause"

      # Database connection pool exhaustion
      - alert: DatabaseConnectionPoolExhaustion
        expr: fraudguard_database_connections_active / fraudguard_database_connections_max > 0.9
        for: 2m
        labels:
          severity: warning
          team: platform
          service: api-gateway
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "Using {{ $value | humanizePercentage }} of available database connections"
          action_required: "Scale connection pool or investigate connection leaks"

      # Redis cache hit rate low
      - alert: RedisCacheHitRateLow
        expr: fraudguard_cache_hits_total / (fraudguard_cache_hits_total + fraudguard_cache_misses_total) < 0.8
        for: 10m
        labels:
          severity: warning
          team: platform
          service: api-gateway
        annotations:
          summary: "Redis cache hit rate is low"
          description: "Cache hit rate is {{ $value | humanizePercentage }}, below 80% threshold"
          impact: "Increased database load and response times"

  - name: fraudguard.infrastructure
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"
          threshold: "80%"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"
          threshold: "85%"

      # Disk space low
      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage is {{ $value }}% on mount {{ $labels.mountpoint }}"
          action_required: "Free up disk space or add storage capacity"

      # Kubernetes pod not ready
      - alert: KubernetesPodNotReady
        expr: kube_pod_status_ready{condition="false"} == 1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kubernetes pod not ready"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is not ready"
          runbook_url: "https://wiki.company.com/runbooks/kubernetes/pod-not-ready"

  - name: fraudguard.business_metrics
    rules:
      # Sudden drop in transaction volume
      - alert: TransactionVolumeDrop
        expr: fraudguard_daily_transaction_volume < fraudguard_daily_transaction_volume offset 24h * 0.5
        for: 15m
        labels:
          severity: critical
          team: business
          service: fraudguard
        annotations:
          summary: "Significant drop in transaction volume"
          description: "Current transaction volume is {{ $value }}, 50% less than yesterday"
          impact: "Potential revenue impact, investigate system issues"
          action_required: "Contact business stakeholders and investigate"

      # Fraud prevention savings below threshold
      - alert: LowFraudPreventionSavings
        expr: increase(fraudguard_fraud_prevention_savings_total[24h]) < 10000
        for: 30m
        labels:
          severity: warning
          team: fraud_detection
          service: fraudguard
        annotations:
          summary: "Low fraud prevention savings"
          description: "Daily fraud prevention savings are ${{ $value }}, below expected threshold"
          threshold: "$10,000"
          impact: "Potential decrease in fraud detection effectiveness"

      # Unusual fraud pattern spike
      - alert: UnusualFraudPatternSpike
        expr: increase(fraudguard_suspicious_patterns_detected_total[1h]) > increase(fraudguard_suspicious_patterns_detected_total[1h] offset 24h) * 3
        for: 10m
        labels:
          severity: warning
          team: fraud_detection
          service: fraudguard
        annotations:
          summary: "Unusual spike in fraud patterns detected"
          description: "Fraud pattern detection is 3x higher than usual for this time"
          action_required: "Investigate for new fraud vectors or system issues"

  - name: fraudguard.external_dependencies
    rules:
      # Kafka consumer lag high
      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_lag_sum > 1000
        for: 5m
        labels:
          severity: warning
          team: platform
          service: kafka
        annotations:
          summary: "High Kafka consumer lag"
          description: "Consumer lag is {{ $value }} messages"
          impact: "Delayed fraud detection processing"
          action_required: "Scale consumers or investigate processing bottlenecks"

      # Neo4j database connection issues
      - alert: Neo4jConnectionFailure
        expr: fraudguard_neo4j_health_check == 0
        for: 2m
        labels:
          severity: critical
          team: platform
          service: neo4j
        annotations:
          summary: "Neo4j database connection failure"
          description: "Cannot connect to Neo4j database"
          impact: "Graph analysis and relationship detection unavailable"
          action_required: "Check Neo4j service status and network connectivity"

      # External API dependency failure
      - alert: ExternalAPIFailure
        expr: fraudguard_external_api_health_check{api=~".*"} == 0
        for: 3m
        labels:
          severity: warning
          team: platform
          service: external-api
        annotations:
          summary: "External API dependency failure"
          description: "External API {{ $labels.api }} is not responding"
          impact: "Reduced fraud detection capabilities depending on the API"
          action_required: "Check external service status and implement fallback if available"
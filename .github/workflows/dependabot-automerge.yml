name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v1
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"
    
    - name: Auto-approve minor and patch updates
      if: steps.metadata.outputs.update-type != 'version-update:semver-major'
      run: |
        gh pr review --approve "$PR_URL"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Auto-merge non-major updates after CI passes
      if: steps.metadata.outputs.update-type != 'version-update:semver-major'
      run: |
        # Wait for CI to complete
        echo "Waiting for CI to complete..."
        
        # Enable auto-merge
        gh pr merge --auto --squash "$PR_URL"
        echo "✅ Auto-merge enabled for ${{ steps.metadata.outputs.dependency-names }}"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Comment on major updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-major'
      run: |
        gh pr comment "$PR_URL" --body "🚨 **Major version update detected!**
        
        This PR updates **${{ steps.metadata.outputs.dependency-names }}** from **${{ steps.metadata.outputs.previous-version }}** to **${{ steps.metadata.outputs.new-version }}**.
        
        Major updates may include breaking changes. Please:
        1. Review the changelog/release notes
        2. Test thoroughly in a development environment
        3. Update any affected code
        4. Manual review and approval required
        
        This PR will **NOT** be auto-merged."
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Security-focused auto-merge for security updates
  security-updates:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    needs: dependabot-auto-merge
    
    steps:
    - name: Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v1
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"
    
    - name: Auto-merge security updates
      if: contains(steps.metadata.outputs.dependency-names, 'security') || contains(github.event.pull_request.title, 'security')
      run: |
        # Security updates get priority auto-merge
        gh pr review --approve "$PR_URL"
        gh pr merge --auto --squash "$PR_URL"
        
        # Notify about security update
        gh pr comment "$PR_URL" --body "🔒 **Security update auto-merged**
        
        This security update has been automatically merged to address potential vulnerabilities.
        
        Updated: **${{ steps.metadata.outputs.dependency-names }}**
        Version: **${{ steps.metadata.outputs.previous-version }}** → **${{ steps.metadata.outputs.new-version }}**"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: 'FraudGuard 360 - Enterprise Testing Suite'

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run nightly tests at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  JAVA_VERSION: '11'

jobs:
  # Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core-ml-service, risk-scoring-service, graph-analytics-service, api-gateway, frontend, stream-processor-flink]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python (for ML Services & API Gateway)
      if: matrix.service == 'api-gateway' || matrix.service == 'ml-service'
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Setup Node.js (for Frontend)
      if: matrix.service == 'frontend'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Setup Java (for Flink Jobs)
      if: matrix.service == 'flink-jobs'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Install Python dependencies
      if: matrix.service == 'api-gateway' || matrix.service == 'ml-service'
      run: |
        cd ${{ matrix.service }}
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx
        
    - name: Install Node.js dependencies
      if: matrix.service == 'frontend'
      run: |
        cd frontend
        npm ci
        
    - name: Run API Gateway tests
      if: matrix.service == 'api-gateway'
      run: |
        cd api-gateway
        python -m pytest tests/ -v --cov=app --cov-report=xml --cov-report=html
        
    - name: Run ML Service tests
      if: matrix.service == 'ml-service'
      run: |
        cd ml-service
        python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
        
    - name: Run Frontend tests
      if: matrix.service == 'frontend'
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false
        
    - name: Run Flink Job tests
      if: matrix.service == 'flink-jobs'
      run: |
        cd flink-jobs
        mvn test -B
        
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: |
          ./api-gateway/coverage.xml
          ./ml-service/coverage.xml
          ./frontend/coverage/lcov.info
        flags: ${{ matrix.service }}
        name: ${{ matrix.service }}-coverage

  # Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      neo4j:
        image: neo4j:5.13
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      kafka:
        image: confluentinc/cp-kafka:latest
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092
          
      zookeeper:
        image: confluentinc/cp-zookeeper:latest
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Install dependencies
      run: |
        # Install Python dependencies
        pip install -r api-gateway/requirements.txt
        pip install -r ml-service/requirements.txt
        pip install pytest pytest-asyncio httpx
        
        # Install Node.js dependencies
        cd frontend && npm ci && cd ..
        
    - name: Wait for services
      run: |
        # Wait for Neo4j
        for i in {1..30}; do
          if nc -z localhost 7687; then break; fi
          echo "Waiting for Neo4j..."
          sleep 2
        done
        
        # Wait for Kafka
        for i in {1..30}; do
          if nc -z localhost 9092; then break; fi
          echo "Waiting for Kafka..."
          sleep 2
        done
        
    - name: Run integration tests
      run: |
        cd tests/e2e
        python -m pytest test_fraud_detection_pipeline.py -v
        
    - name: Upload integration test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: tests/e2e/results/

  # Security Tests
  security-tests:
    name: Security Testing
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install security testing tools
      run: |
        pip install bandit safety semgrep
        npm install -g audit-ci
        
    - name: Run Bandit security scan
      run: |
        bandit -r . -f json -o bandit-results.json || true
        bandit -r . -f txt || true
        
    - name: Run Safety dependency scan
      run: |
        safety check --json --output safety-results.json || true
        safety check || true
        
    - name: Run Semgrep security scan
      run: |
        semgrep --config=auto --json --output=semgrep-results.json . || true
        
    - name: Run npm audit
      run: |
        cd frontend
        npm audit --audit-level=moderate || true
        
    - name: Run custom security tests
      run: |
        cd testing/security-testing
        pip install -r requirements.txt
        python security_tester.py --url http://localhost:8000 || true
        
    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-scan-results
        path: |
          bandit-results.json
          safety-results.json
          semgrep-results.json
          testing/security-testing/security-results/

  # Load Testing
  load-tests:
    name: Load Testing
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6
        
    - name: Setup test environment
      run: |
        # Start a mock API server for testing
        cd testing/load-testing
        npm install
        node mock-server.js &
        sleep 5
        
    - name: Run load tests
      run: |
        cd testing/load-testing
        k6 run --out json=load-test-results.json fraud-detection-load-test.js
        
    - name: Upload load test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: load-test-results
        path: testing/load-testing/load-test-results.json

  # Code Quality
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install Python quality tools
      run: |
        pip install flake8 black isort mypy pylint
        
    - name: Install Node.js quality tools
      run: |
        npm install -g eslint prettier typescript
        
    - name: Run Python linting
      run: |
        # Run flake8
        flake8 api-gateway ml-service --max-line-length=88 --extend-ignore=E203,W503
        
        # Run black (check only)
        black --check api-gateway ml-service
        
        # Run isort (check only)
        isort --check-only api-gateway ml-service
        
        # Run pylint
        pylint api-gateway/app ml-service --fail-under=8.0
        
    - name: Run TypeScript linting
      run: |
        cd frontend
        npm ci
        npx eslint src --ext .ts,.tsx
        npx prettier --check src
        npx tsc --noEmit
        
    - name: SonarQube Scan
      uses: sonarqube-quality-gate-action@master
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Build and Test Docker Images
  docker-tests:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: unit-tests
    
    strategy:
      matrix:
        service: [api-gateway, ml-service, frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        push: false
        tags: fraudguard-${{ matrix.service }}:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Test Docker image
      run: |
        # Run basic container health check
        docker run --rm --name test-${{ matrix.service }} -d fraudguard-${{ matrix.service }}:test
        sleep 10
        
        # Check if container is running
        if docker ps | grep test-${{ matrix.service }}; then
          echo "✅ Container is running"
          docker stop test-${{ matrix.service }}
        else
          echo "❌ Container failed to start"
          docker logs test-${{ matrix.service }}
          exit 1
        fi
        
    - name: Run container security scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: fraudguard-${{ matrix.service }}:test
        format: 'sarif'
        output: 'trivy-${{ matrix.service }}.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-${{ matrix.service }}.sarif'

  # Performance Testing
  performance-tests:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Run performance tests
      run: |
        cd tests/performance
        npm install
        node fraud_detection_load_test.js
        
    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-test-results
        path: tests/performance/results/

  # Test Results Summary
  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests, load-tests, code-quality, docker-tests]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Generate test summary
      run: |
        echo "# FraudGuard 360 - Test Results Summary" > test-summary.md
        echo "" >> test-summary.md
        echo "## Build Information" >> test-summary.md
        echo "- **Commit:** ${{ github.sha }}" >> test-summary.md
        echo "- **Branch:** ${{ github.ref_name }}" >> test-summary.md
        echo "- **Workflow:** ${{ github.workflow }}" >> test-summary.md
        echo "- **Run ID:** ${{ github.run_id }}" >> test-summary.md
        echo "" >> test-summary.md
        
        echo "## Test Results" >> test-summary.md
        echo "- **Unit Tests:** ${{ needs.unit-tests.result }}" >> test-summary.md
        echo "- **Integration Tests:** ${{ needs.integration-tests.result }}" >> test-summary.md
        echo "- **Security Tests:** ${{ needs.security-tests.result }}" >> test-summary.md
        echo "- **Load Tests:** ${{ needs.load-tests.result }}" >> test-summary.md
        echo "- **Code Quality:** ${{ needs.code-quality.result }}" >> test-summary.md
        echo "- **Docker Tests:** ${{ needs.docker-tests.result }}" >> test-summary.md
        echo "" >> test-summary.md
        
        if [[ "${{ needs.unit-tests.result }}" == "success" && 
              "${{ needs.integration-tests.result }}" == "success" && 
              "${{ needs.security-tests.result }}" == "success" && 
              "${{ needs.code-quality.result }}" == "success" ]]; then
          echo "## ✅ Overall Status: PASSED" >> test-summary.md
          echo "All critical tests passed successfully!" >> test-summary.md
        else
          echo "## ❌ Overall Status: FAILED" >> test-summary.md
          echo "One or more critical tests failed. Please review the results." >> test-summary.md
        fi
        
    - name: Upload test summary
      uses: actions/upload-artifact@v4
      with:
        name: test-summary
        path: test-summary.md
        
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('test-summary.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });

  # Deployment (only on main branch)
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests, code-quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to staging environment
      run: |
        echo "🚀 Deploying to staging environment..."
        # Add actual deployment commands here
        echo "✅ Deployment completed successfully"
        
    - name: Run smoke tests on staging
      run: |
        echo "🧪 Running smoke tests on staging..."
        # Add smoke test commands here
        echo "✅ Smoke tests passed"
        
    - name: Notify deployment success
      if: success()
      run: |
        echo "✅ FraudGuard 360 successfully deployed to staging!"
name: Deploy to Dev

on:
  push:
    branches: [ dev ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Helm lint
        run: helm lint helm-chart
      - name: Deploy with Helm
        uses: WyriHaximus/github-action-helm3@v2
        with:
          exec: helm upgrade --install fraudguard-dev helm-chart --namespace dev --values helm-chart/values.yaml
          kubeconfig: ${{ secrets.KUBECONFIG }}
      - name: Run E2E tests
        run: npx cypress run  # Assume Cypress in tests/

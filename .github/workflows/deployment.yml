name: 🚀 Deployment Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
      version:
        description: 'Version to deploy'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fraudguard-360

permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  build-and-push:
    name: 🏗️ Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    strategy:
      matrix:
        service: [api-gateway, ml-service, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

  security-scan:
    name: 🔒 Security Scan Images
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      matrix:
        service: [api-gateway, ml-service, frontend]
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'

  deploy-staging:
    name: 🧪 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.fraudguard360.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.27.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name fraudguard-staging

      - name: Deploy with Helm
        run: |
          helm upgrade --install fraudguard-staging ./helm-chart \
            --namespace fraudguard-staging \
            --create-namespace \
            --values helm-chart/values.staging.yaml \
            --set image.tag=${{ github.sha }} \
            --set ingress.hosts[0].host=staging.fraudguard360.com \
            --wait --timeout=10m

      - name: Run deployment tests
        run: |
          kubectl wait --for=condition=ready pod -l app=fraudguard -n fraudguard-staging --timeout=300s
          kubectl get pods -n fraudguard-staging
          
          # Health check
          curl -f https://staging.fraudguard360.com/health || exit 1

      - name: Run smoke tests
        run: |
          # Run basic smoke tests to verify deployment
          python tests/smoke/staging_smoke_tests.py

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://fraudguard360.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.27.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name fraudguard-production

      - name: Blue-Green Deployment
        run: |
          # Deploy to green environment
          helm upgrade --install fraudguard-green ./helm-chart \
            --namespace fraudguard-production \
            --values helm-chart/values.production.yaml \
            --set image.tag=${{ github.ref_name }} \
            --set service.selector=green \
            --wait --timeout=15m

      - name: Run production health checks
        run: |
          kubectl wait --for=condition=ready pod -l app=fraudguard,version=green -n fraudguard-production --timeout=300s
          
          # Comprehensive health checks
          python tests/health/production_health_checks.py --target=green

      - name: Switch traffic to green
        run: |
          # Update ingress to point to green deployment
          kubectl patch ingress fraudguard-ingress -n fraudguard-production -p '{"spec":{"rules":[{"host":"fraudguard360.com","http":{"paths":[{"path":"/","pathType":"Prefix","backend":{"service":{"name":"fraudguard-green","port":{"number":80}}}}]}}]}}'

      - name: Monitor green deployment
        run: |
          # Monitor for 5 minutes
          sleep 300
          
          # Check error rates and response times
          python tests/monitoring/production_monitoring.py --duration=300

      - name: Cleanup blue deployment
        run: |
          # Remove old blue deployment after successful green deployment
          helm uninstall fraudguard-blue -n fraudguard-production || true

  rollback:
    name: 🔄 Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: [deploy-production]
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.27.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name fraudguard-production

      - name: Rollback to previous version
        run: |
          # Switch traffic back to blue (previous) deployment
          kubectl patch ingress fraudguard-ingress -n fraudguard-production -p '{"spec":{"rules":[{"host":"fraudguard360.com","http":{"paths":[{"path":"/","pathType":"Prefix","backend":{"service":{"name":"fraudguard-blue","port":{"number":80}}}}]}}]}}'
          
          # Remove failed green deployment
          helm uninstall fraudguard-green -n fraudguard-production

      - name: Notify team of rollback
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "text": "🚨 Production deployment failed and has been rolled back",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.ref_name }}",
                      "short": true
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify:
    name: 📢 Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Notify successful deployment
        if: needs.deploy-production.result == 'success'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '🚀 Production deployment successful!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify staging deployment
        if: needs.deploy-staging.result == 'success' && needs.deploy-production.result == 'skipped'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '🧪 Staging deployment successful!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  performance-monitoring:
    name: 📊 Performance Monitoring
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: needs.deploy-production.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run performance benchmarks
        run: |
          # Run post-deployment performance tests
          python tests/performance/production_benchmark.py

      - name: Update performance dashboard
        run: |
          # Update Grafana dashboard with deployment metrics
          curl -X POST "https://grafana.fraudguard360.com/api/annotations" \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "Production deployment: ${{ github.ref_name }}",
              "tags": ["deployment", "production"],
              "time": '$(date +%s)'000'
            }'
name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      
      - name: Build frontend
        run: cd frontend && npm run build
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          cd api-gateway && pip install -r requirements.txt || echo "No requirements.txt found"
          cd ml-service && pip install -r requirements.txt || echo "No requirements.txt found"
      
      - name: Build Docker images
        run: |
          docker build -t fraudguard/frontend ./frontend || echo "Frontend Dockerfile not found"
          docker build -t fraudguard/api-gateway ./api-gateway || echo "API Gateway Dockerfile not found"
          docker build -t fraudguard/ml-service ./ml-service || echo "ML Service Dockerfile not found"
      
      - name: Test Docker Compose
        run: |
          docker-compose config
          echo "Docker Compose configuration is valid"

name: "CodeQL"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '24 18 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java', 'javascript', 'python' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Set up Java
      if: matrix.language == 'java'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Build Java projects
      if: matrix.language == 'java'
      run: |
        if [ -d "stream-processor-flink" ]; then
          cd stream-processor-flink && mvn clean compile -DskipTests || echo "stream-processor-flink build failed"
        fi
        if [ -d "flink-jobs" ]; then
          cd flink-jobs && mvn clean compile -DskipTests || echo "flink-jobs build failed"
        fi

    - name: Set up Node.js
      if: matrix.language == 'javascript'
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build JavaScript project
      if: matrix.language == 'javascript'
      run: |
        if [ -d "frontend" ]; then
          cd frontend
          npm ci
          npm run build || echo "Frontend build failed but continuing for CodeQL"
        else
          echo "Frontend directory not found"
        fi

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:${{ matrix.language }}"
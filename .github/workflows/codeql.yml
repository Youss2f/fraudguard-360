name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly scan on Mondays at 6 AM UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'java', 'javascript', 'python' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Setup Node.js
      if: matrix.language == 'javascript'
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup Python
      if: matrix.language == 'python'
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Setup Java
      if: matrix.language == 'java'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Install JavaScript dependencies
      if: matrix.language == 'javascript'
      run: |
        if [ -f "package.json" ]; then
          npm ci --production || npm install --production
        fi
        if [ -f "frontend/package.json" ]; then
          cd frontend && (npm ci --production || npm install --production)
        fi
        
    - name: Install Python dependencies
      if: matrix.language == 'python'
      run: |
        python -m pip install --upgrade pip
        find . -name "requirements.txt" -exec pip install -r {} \; || echo "No requirements.txt found"

    - name: Build Java projects
      if: matrix.language == 'java'
      run: |
        if [ -d "stream-processor-flink" ]; then
          cd stream-processor-flink && mvn clean compile -DskipTests || echo "stream-processor-flink build failed"
        fi
        if [ -d "flink-jobs" ]; then
          cd flink-jobs && mvn clean compile -DskipTests || echo "flink-jobs build failed"
        fi

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
        upload: true
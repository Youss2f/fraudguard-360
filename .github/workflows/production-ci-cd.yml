name: Production CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'  # Weekly dependency audit

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  security-events: write
  packages: write
  pull-requests: write

jobs:
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --audit-signatures

    - name: Lint code
      run: npm run lint

    - name: Type checking
      run: npm run type-check
      continue-on-error: false

    - name: Security audit
      run: |
        npm audit --audit-level high
        npx audit-ci --high

    - name: Initialize CodeQL for quality check
      uses: github/codeql-action/init@v2
      with:
        languages: javascript
        config-file: ./.github/codeql/codeql-config.yml
        queries: +security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:javascript/quality-gate"

    - name: License compliance
      run: npx license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC'

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16, 18, 20]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run unit tests
      run: npm run test:unit -- --coverage --passWithNoTests

    - name: Run integration tests
      run: npm run test:integration
      env:
        NODE_ENV: test

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.node-version == 18
      with:
        file: ./coverage/lcov.info
        fail_ci_if_error: false

  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: javascript

    - name: Autobuild
      uses: github/codeql-action/autobuild@v2

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  powershell-validation:
    name: PowerShell Script Validation
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate PowerShell syntax
      shell: powershell
      run: |
        $ErrorActionPreference = 'Stop'
        Get-ChildItem -Path "scripts" -Filter "*.ps1" -Recurse | ForEach-Object {
          Write-Host "Validating $($_.Name)..."
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $_.FullName -Raw), [ref]$errors)
          if ($errors) {
            throw "Syntax errors in $($_.Name): $($errors -join '; ')"
          }
          Write-Host "✅ $($_.Name) is valid"
        }

    - name: Run PSScriptAnalyzer
      shell: powershell
      run: |
        Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
        $results = Get-ChildItem -Path "scripts" -Filter "*.ps1" -Recurse | 
          ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName }
        
        $errors = $results | Where-Object Severity -eq 'Error'
        $warnings = $results | Where-Object Severity -eq 'Warning'
        
        if ($errors) {
          $errors | Format-Table
          throw "PSScriptAnalyzer found $($errors.Count) error(s)"
        }
        
        if ($warnings) {
          Write-Warning "PSScriptAnalyzer found $($warnings.Count) warning(s)"
          $warnings | Format-Table
        }

  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [code-quality, test-suite]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --production

    - name: Build application
      run: npm run build

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Dependency Review
      uses: actions/dependency-review-action@v3
      with:
        fail-on-severity: high
        deny-licenses: GPL-2.0,GPL-3.0

  deployment-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-package, security-analysis]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Deploy to staging environment
      run: |
        echo "Deploying image digest: ${{ needs.build-and-package.outputs.image-digest }}"
        # Add your staging deployment logic here

  deployment-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-package, security-analysis]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Deploy to production environment
      run: |
        echo "Deploying image digest: ${{ needs.build-and-package.outputs.image-digest }}"
        # Add your production deployment logic here

  cleanup-workflows:
    name: Cleanup Failed Workflows
    runs-on: windows-latest
    if: github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run cleanup script
      shell: powershell
      run: |
        .\scripts\cleanup-failed-actions.ps1 -GitHubToken "${{ secrets.GITHUB_TOKEN }}" -GitHubUser "${{ github.repository_owner }}" -GitHubRepository "${{ github.event.repository.name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
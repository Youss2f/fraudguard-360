name: FraudGuard 360 CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
      - 'hotfix/*'
  pull_request:
    branches:
      - main
      - develop
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_VERSION: 3.13.0
  KUBECTL_VERSION: 1.28.0

jobs:
  # ==============================================================================
  # Code Quality and Testing
  # ==============================================================================
  
  code-quality:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      # Python API Gateway Tests
      - name: Install Python dependencies
        working-directory: api-gateway
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black isort safety bandit
      
      - name: Python code formatting check
        working-directory: api-gateway
        run: |
          black --check .
          isort --check-only .
      
      - name: Python linting
        working-directory: api-gateway
        run: flake8 .
      
      - name: Python security scan
        working-directory: api-gateway
        run: |
          safety check
          bandit -r app/
      
      - name: Python unit tests
        working-directory: api-gateway
        run: pytest tests/ --cov=app --cov-report=xml --cov-report=html
      
      # Frontend Tests
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Frontend linting
        working-directory: frontend
        run: npm run lint
      
      - name: Frontend type checking
        working-directory: frontend
        run: npm run type-check
      
      - name: Frontend unit tests
        working-directory: frontend
        run: npm run test -- --coverage --watchAll=false
      
      - name: Frontend build test
        working-directory: frontend
        run: npm run build
      
      # Java Flink Jobs Tests
      - name: Java unit tests
        working-directory: flink-jobs
        run: mvn clean test
      
      - name: Java code coverage
        working-directory: flink-jobs
        run: mvn jacoco:report
      
      # ML Service Tests
      - name: Install ML service dependencies
        working-directory: ml-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: ML service tests
        working-directory: ml-service
        run: pytest tests/ --cov=.
      
      # Upload coverage reports
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./api-gateway/coverage.xml,./frontend/coverage/lcov.info
          flags: unittests
          name: fraudguard-360-coverage

  # ==============================================================================
  # Container Image Building
  # ==============================================================================
  
  build-images:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        service: [api-gateway, frontend, ml-service]
    
    outputs:
      api-gateway-image: ${{ steps.image-meta.outputs.tags }}
      frontend-image: ${{ steps.image-meta.outputs.tags }}
      ml-service-image: ${{ steps.image-meta.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: image-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image-meta.outputs.tags }}
          labels: ${{ steps.image-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDTIME=${{ fromJSON(steps.image-meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.image-meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.image-meta.outputs.json).labels['org.opencontainers.image.revision'] }}

  # ==============================================================================
  # Security Scanning
  # ==============================================================================
  
  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        service: [api-gateway, frontend, ml-service]
    
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

  # ==============================================================================
  # Deployment to Staging
  # ==============================================================================
  
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
      
      - name: Deploy to staging
        run: |
          export KUBECONFIG=kubeconfig
          helm dependency update ./helm-chart
          helm upgrade --install fraudguard-staging ./helm-chart \
            --namespace fraudguard-staging \
            --create-namespace \
            --values ./helm-chart/values.yaml \
            --values ./helm-chart/values-staging.yaml \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ \
            --set api-gateway.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set ml-service.image.tag=${{ github.sha }} \
            --wait \
            --timeout=10m
      
      - name: Run deployment tests
        run: |
          export KUBECONFIG=kubeconfig
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/part-of=fraudguard-360 -n fraudguard-staging --timeout=300s
          kubectl get pods -n fraudguard-staging
          
          # Health check tests
          kubectl port-forward -n fraudguard-staging svc/fraudguard-staging-api-gateway 8000:8000 &
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          
          kubectl port-forward -n fraudguard-staging svc/fraudguard-staging-frontend 3000:3000 &
          sleep 10
          curl -f http://localhost:3000 || exit 1

  # ==============================================================================
  # Integration Testing
  # ==============================================================================
  
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install test dependencies
        run: |
          pip install pytest requests websockets kafka-python neo4j
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
      
      - name: Run E2E tests
        env:
          KUBECONFIG: kubeconfig
          TEST_ENVIRONMENT: staging
        run: |
          # Port forward services for testing
          kubectl port-forward -n fraudguard-staging svc/fraudguard-staging-api-gateway 8000:8000 &
          kubectl port-forward -n fraudguard-staging svc/fraudguard-staging-frontend 3000:3000 &
          sleep 30
          
          # Run comprehensive E2E tests
          python -m pytest tests/e2e/ -v --tb=short

  # ==============================================================================
  # Production Deployment
  # ==============================================================================
  
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, security-scan]
    if: github.event_name == 'release'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
      
      - name: Deploy to production
        run: |
          export KUBECONFIG=kubeconfig
          helm dependency update ./helm-chart
          
          # Blue-Green deployment strategy
          helm upgrade --install fraudguard-prod ./helm-chart \
            --namespace fraudguard-production \
            --create-namespace \
            --values ./helm-chart/values.yaml \
            --values ./helm-chart/values-production.yaml \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ \
            --set api-gateway.image.tag=${{ github.event.release.tag_name }} \
            --set frontend.image.tag=${{ github.event.release.tag_name }} \
            --set ml-service.image.tag=${{ github.event.release.tag_name }} \
            --wait \
            --timeout=15m
      
      - name: Production health check
        run: |
          export KUBECONFIG=kubeconfig
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/part-of=fraudguard-360 -n fraudguard-production --timeout=600s
          kubectl get pods -n fraudguard-production
          
          # Extended health checks for production
          sleep 60
          kubectl get pods -n fraudguard-production -o wide
          kubectl top pods -n fraudguard-production

  # ==============================================================================
  # Performance Testing
  # ==============================================================================
  
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'release'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
      
      - name: Run performance tests
        env:
          KUBECONFIG: kubeconfig
        run: |
          # Port forward for performance testing
          kubectl port-forward -n fraudguard-production svc/fraudguard-prod-api-gateway 8000:8000 &
          sleep 30
          
          # Run load tests
          k6 run tests/performance/fraud_detection_load_test.js
      
      - name: Upload performance results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-results
          path: performance-results.json

  # ==============================================================================
  # Notification
  # ==============================================================================
  
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, performance-tests]
    if: always()
    
    steps:
      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: |
            FraudGuard 360 deployment completed
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Status: ${{ job.status }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
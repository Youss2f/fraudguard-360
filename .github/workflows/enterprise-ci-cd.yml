name: FraudGuard-360 Enterprise CI/CD Pipeline

# Professional CI/CD pipeline with security scanning, testing, and deployment
# Features: Multi-stage builds, security scanning, automated testing, deployment automation

on:
  push:
    branches: [ main, develop, 'feature/*', 'hotfix/*' ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"
  JAVA_VERSION: "11"

jobs:
  # Security and vulnerability scanning
  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Bandit security linter
      run: |
        pip install bandit[toml]
        bandit -r src/ -f json -o bandit-report.json || true

    - name: Run Safety dependency scanner
      run: |
        pip install safety
        safety check --json --output safety-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
          trivy-results.sarif

  # Code quality and linting
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        component: [ml-service, api-gateway, stream-processor]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Java
      if: matrix.component == 'stream-processor'
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.m2/repository
        key: ${{ runner.os }}-deps-${{ matrix.component }}-${{ hashFiles('**/requirements.txt', '**/pom.xml') }}

    - name: Install Python dependencies
      if: matrix.component != 'stream-processor'
      run: |
        cd src/services/${{ matrix.component }}
        pip install -r requirements.txt
        pip install black flake8 mypy pytest

    - name: Python code formatting check
      if: matrix.component != 'stream-processor'
      run: |
        cd src/services/${{ matrix.component }}
        black --check --diff .

    - name: Python linting
      if: matrix.component != 'stream-processor'
      run: |
        cd src/services/${{ matrix.component }}
        flake8 . --max-line-length=100 --exclude=venv

    - name: Python type checking
      if: matrix.component != 'stream-processor'
      run: |
        cd src/services/${{ matrix.component }}
        mypy . --ignore-missing-imports

    - name: Java code quality
      if: matrix.component == 'stream-processor'
      run: |
        cd src/services/${{ matrix.component }}
        mvn compile checkstyle:check spotbugs:check

  # Unit and integration testing
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality]
    
    strategy:
      matrix:
        component: [ml-service, api-gateway, stream-processor]
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: fraudguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Java
      if: matrix.component == 'stream-processor'
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Install Python dependencies
      if: matrix.component != 'stream-processor'
      run: |
        cd src/services/${{ matrix.component }}
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio

    - name: Run Python tests
      if: matrix.component != 'stream-processor'
      env:
        REDIS_URL: redis://localhost:6379
        DATABASE_URL: postgresql://postgres:test_password@localhost:5432/fraudguard_test
      run: |
        cd src/services/${{ matrix.component }}
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html

    - name: Run Java tests
      if: matrix.component == 'stream-processor'
      run: |
        cd src/services/${{ matrix.component }}
        mvn test

    - name: Upload test coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./src/services/${{ matrix.component }}/coverage.xml
        flags: ${{ matrix.component }}

  # Build and push Docker images
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' || github.event_name == 'release'
    
    strategy:
      matrix:
        component: [ml-service, api-gateway, stream-processor, risk-scoring, graph-analytics]
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./src/services/${{ matrix.component }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          VCS_REF=${{ github.sha }}
          VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}

  # Performance testing
  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install performance testing tools
      run: |
        pip install locust pytest-benchmark
        npm install -g artillery

    - name: Run ML service performance tests
      run: |
        cd tests/performance
        python test_load_performance.py

    - name: Run API load tests
      run: |
        cd tests/performance
        artillery run fraud_detection_load_test.js

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: tests/performance/results/

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, performance-test]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.28.0'

    - name: Setup Helm
      uses: azure/setup-helm@v4
      with:
        version: 'v3.12.0'

    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

    - name: Deploy with Helm
      run: |
        helm upgrade --install fraudguard-360-staging ./infrastructure/helm-charts/fraudguard-360 \
          --namespace fraudguard-staging \
          --create-namespace \
          --values ./infrastructure/helm-charts/fraudguard-360/values-staging.yaml \
          --set image.tag=${{ github.sha }} \
          --wait --timeout=10m

    - name: Run staging smoke tests
      run: |
        cd tests/smoke
        python health_check.py --environment staging

  # Deploy to production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event_name == 'release'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.28.0'

    - name: Setup Helm
      uses: azure/setup-helm@v4
      with:
        version: 'v3.12.0'

    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

    - name: Deploy with Helm
      run: |
        helm upgrade --install fraudguard-360 ./infrastructure/helm-charts/fraudguard-360 \
          --namespace fraudguard-360 \
          --create-namespace \
          --values ./infrastructure/helm-charts/fraudguard-360/values-production.yaml \
          --set image.tag=${{ github.ref_name }} \
          --wait --timeout=15m

    - name: Run production health checks
      run: |
        cd tests/smoke
        python health_check.py --environment production

    - name: Notify deployment success
      uses: 8398a7/action-slack@v3
      if: success()
      with:
        status: success
        text: "✅ FraudGuard-360 v${{ github.ref_name }} deployed successfully to production!"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Security compliance scan
  compliance-scan:
    name: Compliance & Security Audit
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run container security scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/ml-service:${{ github.ref_name }}'
        format: 'sarif'
        output: 'production-security-scan.sarif'

    - name: Upload compliance report
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'production-security-scan.sarif'

  # Cleanup old images
  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Delete old container images
      uses: actions/delete-package-versions@v5
      with:
        package-name: 'ml-service'
        package-type: 'container'
        min-versions-to-keep: 10
name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
        service: [ml-service, api-gateway, core-ml-service, risk-scoring-service, graph-analytics-service]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      working-directory: ${{ matrix.service }}
      run: |
        if [ -f "requirements.txt" ]; then
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov bandit safety flake8
        else
          echo "No requirements.txt found in ${{ matrix.service }}, installing basic tools only"
          python -m pip install --upgrade pip
          pip install pytest pytest-cov bandit safety flake8
        fi
    
    - name: Run linting
      working-directory: ${{ matrix.service }}
      run: |
        if [ -f "*.py" ] || find . -name "*.py" -type f | head -1 | grep -q .; then
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        else
          echo "No Python files found in ${{ matrix.service }}, skipping linting"
        fi
    
    - name: Run security checks
      working-directory: ${{ matrix.service }}
      run: |
        if find . -name "*.py" -type f | head -1 | grep -q .; then
          bandit -r . --severity-level medium || true
          safety check || true
        else
          echo "No Python files found in ${{ matrix.service }}, skipping security checks"
        fi
    
    - name: Run tests
      working-directory: ${{ matrix.service }}
      run: |
        if [ -d "tests" ] || [ -f "test_*.py" ]; then
          pytest --cov=. --cov-report=xml || true
        else
          echo "No tests found, skipping"
        fi

  test-java-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [11, 17]
        service: [stream-processor-flink, flink-jobs]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
    
    - name: Run Maven tests
      working-directory: ${{ matrix.service }}
      run: |
        mvn clean compile test || true

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18
      uses: actions/setup-node@v6
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install and test
      working-directory: frontend
      run: |
        npm ci
        npm run build
        npm run test:ci || echo "Frontend tests failed but continuing"

  build-status:
    runs-on: ubuntu-latest
    needs: [test-python-services, test-java-services, test-frontend]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        echo "Build completed"

name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, ml-service, frontend, flink-jobs]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        if: contains(matrix.service, 'service') || matrix.service == 'api-gateway'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        if: matrix.service == 'flink-jobs'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Install Dependencies
        run: |
          if [[ "${{ matrix.service }}" == "frontend" ]]; then
            cd frontend && npm ci
          elif [[ "${{ matrix.service }}" == "flink-jobs" ]]; then
            cd flink-jobs && mvn dependency:go-offline
          else
            cd ${{ matrix.service }}
            pip install -r requirements.txt
            pip install pytest pytest-cov
          fi

      - name: Run Tests
        run: |
          if [[ "${{ matrix.service }}" == "frontend" ]]; then
            cd frontend && npm test -- --coverage --watchAll=false --ci
          elif [[ "${{ matrix.service }}" == "flink-jobs" ]]; then
            cd flink-jobs && mvn test
          else
            cd ${{ matrix.service }}
            python -m pytest tests/ --cov=. --cov-report=xml -v
          fi

      - name: Build
        run: |
          if [[ "${{ matrix.service }}" == "frontend" ]]; then
            cd frontend && npm run build
          elif [[ "${{ matrix.service }}" == "flink-jobs" ]]; then
            cd flink-jobs && mvn package -DskipTests
          else
            echo "Python service build completed"
          fi

  docker:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [api-gateway, ml-service, frontend]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
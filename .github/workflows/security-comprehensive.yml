name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday at 2 AM UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # SAST - Static Application Security Testing with CodeQL
  codeql-analysis:
    name: CodeQL SAST Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python', 'java' ]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality
    
    - name: Setup Java for Java analysis
      if: matrix.language == 'java'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Build Java projects
      if: matrix.language == 'java'
      run: |
        # Build Flink projects
        cd stream-processor-flink && mvn compile -DskipTests
        cd ../flink-jobs && mvn compile -DskipTests
        cd ../services/processing-service && mvn compile -DskipTests || true
    
    - name: Setup Node.js for JavaScript analysis
      if: matrix.language == 'javascript'
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Build frontend
      if: matrix.language == 'javascript'
      run: |
        if [ -d "frontend" ]; then
          cd frontend
          npm ci
          npm run build || echo "Frontend build failed but continuing"
        else
          echo "Frontend directory not found"
        fi
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:${{ matrix.language }}"

  # Dependency Vulnerability Scanning
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ecosystem: [python, npm, maven]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Python dependency scan with Safety
      if: matrix.ecosystem == 'python'
      run: |
        python -m pip install --upgrade pip safety
        
        # Scan all Python services
        for service in ml-service api-gateway core-ml-service risk-scoring-service graph-analytics-service services/ai-service services/api-gateway services/graph-service; do
          if [ -f "$service/requirements.txt" ]; then
            echo "Scanning $service..."
            cd "$service"
            safety check -r requirements.txt --json --output safety-report-$(basename "$service").json || true
            safety check -r requirements.txt || true
            cd - > /dev/null
          fi
        done
    
    - name: Node.js dependency scan with npm audit
      if: matrix.ecosystem == 'npm'
      run: |
        cd frontend
        npm audit --audit-level moderate
        npm audit fix --dry-run || true
    
    - name: Java dependency scan with OWASP
      if: matrix.ecosystem == 'maven'
      run: |
        # Install Java
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jdk
        
        # Scan Java projects
        for project in stream-processor-flink flink-jobs services/processing-service; do
          if [ -f "$project/pom.xml" ]; then
            echo "Scanning $project..."
            cd "$project"
            mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 || true
            cd - > /dev/null
          fi
        done

  # Secret Scanning
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Run Truffleĥog secret scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

  # Container Security Scanning
  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ml-service, api-gateway, frontend, stream-processor-flink]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        if [ -f "${{ matrix.service }}/Dockerfile" ]; then
          docker build -t fraudguard-${{ matrix.service }}:latest ${{ matrix.service }}
        else
          echo "No Dockerfile found for ${{ matrix.service }}"
          exit 0
        fi
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'fraudguard-${{ matrix.service }}:latest'
        format: 'sarif'
        output: 'trivy-results-${{ matrix.service }}.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

  # Infrastructure as Code Security
  iac-security:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Run Checkov IaC scanner
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: terraform,dockerfile,kubernetes
        output_format: sarif
        output_file_path: checkov-results.sarif
    
    - name: Upload Checkov scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: checkov-results.sarif

  # Custom Security Tests
  custom-security-tests:
    name: Custom Security Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install security testing tools
      run: |
        pip install bandit semgrep pytest
    
    - name: Run Bandit SAST for Python
      run: |
        for service in ml-service api-gateway services/ai-service services/api-gateway services/graph-service; do
          if [ -d "$service" ]; then
            echo "Running Bandit on $service..."
            bandit -r "$service" -f json -o "bandit-$service.json" || true
            bandit -r "$service" --severity-level medium || true
          fi
        done
    
    - name: Run Semgrep SAST
      run: |
        semgrep --config=auto --json --output=semgrep-results.json . || true
        semgrep --config=auto . || true
    
    - name: Run custom vulnerability scanner
      run: |
        if [ -f "testing/security-testing/vulnerability_scanner.py" ]; then
          cd testing/security-testing
          python vulnerability_scanner.py
        else
          echo "Custom vulnerability scanner not found"
        fi

  # Security Summary Report
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [codeql-analysis, dependency-scan, secret-scan, container-security, iac-security, custom-security-tests]
    if: always()
    
    steps:
    - name: Create security summary
      run: |
        echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| CodeQL SAST | ${{ needs.codeql-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Container Security | ${{ needs.container-security.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| IaC Security | ${{ needs.iac-security.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Custom Security Tests | ${{ needs.custom-security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ needs.codeql-analysis.result }}" == "success" && 
              "${{ needs.dependency-scan.result }}" == "success" && 
              "${{ needs.secret-scan.result }}" == "success" && 
              "${{ needs.container-security.result }}" == "success" && 
              "${{ needs.iac-security.result }}" == "success" && 
              "${{ needs.custom-security-tests.result }}" == "success" ]]; then
          echo "✅ **All security scans passed!**" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Some security scans failed. Please review the results.**" >> $GITHUB_STEP_SUMMARY
        fi
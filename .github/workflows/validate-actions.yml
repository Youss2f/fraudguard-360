name: Validate GitHub Actions

on:
  push:
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    name: Validate GitHub Actions Workflows
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install actionlint
      run: |
        bash <(curl https://raw.githubusercontent.com/rhymond/actionlint/main/scripts/download-actionlint.bash) || echo "Failed to download actionlint"
        sudo mv actionlint /usr/local/bin/ || echo "Failed to move actionlint"
    
    - name: Validate workflow syntax
      run: |
        echo "Validating GitHub Actions workflows..."
        if command -v actionlint &> /dev/null; then
          actionlint .github/workflows/*.yml || echo "Some workflow files have issues but continuing"
        else
          echo "actionlint not available, skipping validation"
        fi
        echo "Workflow validation completed!"
    
    - name: Check for workflow best practices
      run: |
        echo "Checking for security best practices..."
        
        # Check for pinned action versions
        echo "Checking for pinned action versions..."
        if grep -r "uses:.*@main\|uses:.*@master" .github/workflows/; then
          echo "Warning: Found actions using @main or @master. Consider pinning to specific versions."
        else
          echo "✓ All actions use pinned versions"
        fi
        
        # Check for secrets in workflows
        echo "Checking for potential secrets..."
        if grep -r -i "password\|secret\|token\|key" .github/workflows/ | grep -v "secrets\." | grep -v "github.token"; then
          echo "Warning: Potential hardcoded secrets found"
        else
          echo "✓ No hardcoded secrets detected"
        fi
        
        # Check for proper permissions
        echo "Checking for permissions configuration..."
        if grep -r "permissions:" .github/workflows/; then
          echo "✓ Permissions are configured"
        else
          echo "Warning: Consider adding explicit permissions to workflows"
        fi
        
        echo "Workflow validation completed!"

  security-check:
    runs-on: ubuntu-latest
    name: Security Configuration Check
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Check security files
      run: |
        echo "Checking security configuration files..."
        
        # Check for security policy
        if [ -f ".github/SECURITY.md" ]; then
          echo "✓ Security policy found"
        else
          echo "❌ Security policy missing"
        fi
        
        # Check for dependabot config
        if [ -f ".github/dependabot.yml" ]; then
          echo "✓ Dependabot configuration found"
        else
          echo "❌ Dependabot configuration missing"
        fi
        
        # Check for CodeQL workflow
        if [ -f ".github/workflows/codeql.yml" ]; then
          echo "✓ CodeQL workflow found"
        else
          echo "❌ CodeQL workflow missing"
        fi
        
        # Check for security scanning workflow
        if [ -f ".github/workflows/security-comprehensive.yml" ]; then
          echo "✓ Security scanning workflow found"
        else
          echo "❌ Security scanning workflow missing"
        fi
        
        echo "Security configuration check completed!"

  workflow-matrix-check:
    runs-on: ubuntu-latest
    name: Workflow Matrix Validation
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Validate matrix configurations
      run: |
        echo "Validating workflow matrix configurations..."
        
        # Check Python versions in CI workflows
        echo "Checking Python version matrix..."
        python_versions=$(grep -r "python-version:" .github/workflows/ | grep -o "\[.*\]" | sort -u)
        echo "Python versions used: $python_versions"
        
        # Check Java versions in CI workflows  
        echo "Checking Java version matrix..."
        java_versions=$(grep -r "java-version:" .github/workflows/ | grep -o "\[.*\]" | sort -u)
        echo "Java versions used: $java_versions"
        
        # Check Node.js versions
        echo "Checking Node.js version matrix..."
        node_versions=$(grep -r "node-version:" .github/workflows/ | grep -v cache | head -5)
        echo "Node.js versions found: $node_versions"
        
        echo "Matrix validation completed!"
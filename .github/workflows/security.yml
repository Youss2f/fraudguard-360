name: 🔒 Security & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    name: 🛡️ Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript, java
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

      - name: Python Security Scan (Bandit)
        run: |
          pip install bandit[toml]
          bandit -r api-gateway/ ml-service/ -f json -o bandit-report.json || true
          bandit -r api-gateway/ ml-service/ -f txt

      - name: Node.js Security Audit
        working-directory: frontend
        run: |
          npm audit --audit-level moderate
          npm audit --json > npm-audit-report.json || true

      - name: Docker Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Dependency Check
        run: |
          # Python dependencies
          pip install safety
          safety check --json --output safety-report.json || true
          
          # Java dependencies (OWASP)
          wget -O dependency-check.zip https://github.com/jeremylong/DependencyCheck/releases/download/v8.4.0/dependency-check-8.4.0-release.zip
          unzip dependency-check.zip
          ./dependency-check/bin/dependency-check.sh --project "FraudGuard-360" --scan flink-jobs/ --format JSON --out dependency-check-report.json || true

  code-quality:
    name: 📊 Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage pytest-cov pylint radon xenon
          pip install -r api-gateway/requirements.txt
          pip install -r ml-service/requirements.txt

      - name: Install Node.js dependencies
        working-directory: frontend
        run: npm ci

      - name: Python Code Complexity Analysis
        run: |
          # Cyclomatic complexity with radon
          radon cc api-gateway/ ml-service/ --show-complexity --min=B
          
          # Maintainability index
          radon mi api-gateway/ ml-service/ --show --min=B
          
          # Halstead complexity metrics
          radon hal api-gateway/ ml-service/
          
          # Code duplication with xenon
          xenon --max-absolute B --max-modules B --max-average A api-gateway/ ml-service/

      - name: Python Code Coverage
        run: |
          cd api-gateway && python -m pytest --cov=. --cov-report=xml --cov-report=html tests/ || true
          cd ../ml-service && python -m pytest --cov=. --cov-report=xml --cov-report=html tests/ || true

      - name: Frontend Code Coverage
        working-directory: frontend
        run: |
          npm test -- --coverage --watchAll=false || true

      - name: Upload Python Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./api-gateway/coverage.xml,./ml-service/coverage.xml
          flags: python
          name: python-coverage

      - name: Upload Frontend Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  docker-security:
    name: 🐳 Docker Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Images
        run: |
          docker build -t fraudguard/api-gateway:test ./api-gateway
          docker build -t fraudguard/ml-service:test ./ml-service
          docker build -t fraudguard/frontend:test ./frontend

      - name: Run Trivy vulnerability scanner on API Gateway
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fraudguard/api-gateway:test'
          format: 'sarif'
          output: 'trivy-api-gateway.sarif'

      - name: Run Trivy vulnerability scanner on ML Service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fraudguard/ml-service:test'
          format: 'sarif'
          output: 'trivy-ml-service.sarif'

      - name: Run Trivy vulnerability scanner on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fraudguard/frontend:test'
          format: 'sarif'
          output: 'trivy-frontend.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-api-gateway.sarif'

  license-compliance:
    name: 📄 License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install license scanners
        run: |
          pip install pip-licenses
          npm install -g license-checker

      - name: Check Python licenses
        run: |
          pip install -r api-gateway/requirements.txt
          pip install -r ml-service/requirements.txt
          pip-licenses --format=json --output-file=python-licenses.json
          pip-licenses --format=plain-vertical

      - name: Check Node.js licenses
        working-directory: frontend
        run: |
          npm ci
          license-checker --json --out ../nodejs-licenses.json
          license-checker --summary

      - name: Check for forbidden licenses
        run: |
          # Check for GPL, AGPL, and other copyleft licenses
          if grep -qi "gpl\|agpl\|copyleft" python-licenses.json nodejs-licenses.json; then
            echo "⚠️  Potential license compliance issue detected"
            echo "Please review the licenses manually"
          else
            echo "✅ No obvious license compliance issues detected"
          fi

  secrets-detection:
    name: 🔐 Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  infrastructure-security:
    name: 🏗️ Infrastructure Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-terraform.sarif

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@master
        with:
          directory: helm-chart/templates/
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-k8s.sarif

      - name: Upload Checkov scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-terraform.sarif

  performance-baseline:
    name: 🚀 Performance Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          # Run Lighthouse CI on built static files
          lhci autorun || echo "Lighthouse CI completed with warnings"

      - name: Bundle Size Analysis
        working-directory: frontend
        run: |
          npm install -g bundlesize
          # Analyze bundle size and compare with previous builds
          npx bundlesize || echo "Bundle size analysis completed"
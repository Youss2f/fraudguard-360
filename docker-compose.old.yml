version: '3.8'

services:
  # Infrastructure Services
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: fraudguard-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - fraudguard-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: fraudguard-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - fraudguard-network
    healthcheck:
      test: kafka-topics --bootstrap-server kafka:29092 --list
      interval: 30s
      timeout: 10s
      retries: 3

  neo4j:
    image: neo4j:5.15-enterprise
    hostname: neo4j
    container_name: fraudguard-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/fraudguard360
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_apoc_export_file_enabled: true
      NEO4J_apoc_import_file_enabled: true
      NEO4J_apoc_import_file_use__neo4j__config: true
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*,apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/var/lib/neo4j/import
      - neo4j-plugins:/plugins
    networks:
      - fraudguard-network
    healthcheck:
      test: cypher-shell -u neo4j -p fraudguard360 "RETURN 1"
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    hostname: redis
    container_name: fraudguard-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --replica-read-only no
    volumes:
      - redis-data:/data
    networks:
      - fraudguard-network
    healthcheck:
      test: redis-cli ping
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    hostname: postgres
    container_name: fraudguard-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fraudguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fraudguard360
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/scripts:/docker-entrypoint-initdb.d
    networks:
      - fraudguard-network
    healthcheck:
      test: pg_isready -U postgres -d fraudguard
      interval: 30s
      timeout: 10s
      retries: 3

  # Microservices
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    hostname: api-gateway
    container_name: fraudguard-api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - ai-service
      - graph-service
      - alerting-service
    environment:
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8001
      GRAPH_SERVICE_URL: http://graph-service:8002
      ALERTING_SERVICE_URL: http://alerting-service:8003
      SECRET_KEY: ${SECRET_KEY:-fraudguard-360-production-secret-key}
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      RATE_LIMIT_PER_MINUTE: 1000
    networks:
      - fraudguard-network
    healthcheck:
      test: curl -f http://localhost:8000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  processing-service:
    build:
      context: ./services/processing-service
      dockerfile: Dockerfile
    hostname: processing-service
    container_name: fraudguard-processing-service
    depends_on:
      - kafka
      - neo4j
      - ai-service
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_CDR: cdr-events
      KAFKA_TOPIC_ALERTS: fraud-alerts
      KAFKA_GROUP_ID: fraud-detection-processor
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: fraudguard360
      AI_SERVICE_URL: http://ai-service:8001
      CHECKPOINT_INTERVAL: 5000
      PARALLELISM: 4
    volumes:
      - processing-checkpoints:/opt/flink/checkpoints
    networks:
      - fraudguard-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    hostname: ai-service
    container_name: fraudguard-ai-service
    ports:
      - "8001:8001"
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      MODEL_VERSION: v1.2.0
      MODEL_PATH: /app/models/graphsage_fraud_detector.pth
    volumes:
      - ai-models:/app/models
    networks:
      - fraudguard-network
    healthcheck:
      test: curl -f http://localhost:8001/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  graph-service:
    build:
      context: ./services/graph-service
      dockerfile: Dockerfile
    hostname: graph-service
    container_name: fraudguard-graph-service
    ports:
      - "8002:8002"
    depends_on:
      - neo4j
      - redis
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: fraudguard360
      REDIS_URL: redis://redis:6379
      CACHE_TTL: 300
    networks:
      - fraudguard-network
    healthcheck:
      test: curl -f http://localhost:8002/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  alerting-service:
    build:
      context: ./services/alerting-service
      dockerfile: Dockerfile
    hostname: alerting-service
    container_name: fraudguard-alerting-service
    ports:
      - "8003:8003"
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_ALERTS: fraud-alerts
      KAFKA_GROUP_ID: alerting-service
      POSTGRES_URL: postgresql://postgres:fraudguard360@postgres:5432/fraudguard
      REDIS_URL: redis://redis:6379
    networks:
      - fraudguard-network
    healthcheck:
      test: curl -f http://localhost:8003/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    hostname: frontend
    container_name: fraudguard-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000/ws
    networks:
      - fraudguard-network
    restart: unless-stopped

  # Monitoring Services
  prometheus:
    image: prom/prometheus:v2.47.0
    hostname: prometheus
    container_name: fraudguard-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    networks:
      - fraudguard-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.1.0
    hostname: grafana
    container_name: fraudguard-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: fraudguard360
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - fraudguard-network
    restart: unless-stopped

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  neo4j-data:
  neo4j-logs:
  neo4j-import:
  neo4j-plugins:
  redis-data:
  postgres-data:
  processing-checkpoints:
  ai-models:
  prometheus-data:
  grafana-data:

networks:
  fraudguard-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"
    depends_on:
      - neo4j
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000/ws
  flink-jobmanager:
    image: apache/flink:1.18
    command: jobmanager
    ports:
      - "6123:6123"
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
  flink-taskmanager:
    image: apache/flink:1.18
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager\ntaskmanager.numberOfTaskSlots: 1"
    scale: 1

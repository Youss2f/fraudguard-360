# ==============================================================================
# FraudGuard 360 - API Gateway Helm Template
# Configurable Kubernetes deployment with Helm templating
# ==============================================================================

{{- if .Values.api-gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fraudguard-360.fullname" . }}-api-gateway
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "fraudguard-360.labels" . | nindent 4 }}
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api-gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "fraudguard-360.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "fraudguard-360.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/component: api
        tier: application
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fraudguard-360.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.global.security.podSecurityContext | nindent 8 }}
      containers:
      - name: api-gateway
        image: "{{ .Values.global.imageRegistry }}{{ .Values.api-gateway.image.repository }}:{{ .Values.api-gateway.image.tag }}"
        imagePullPolicy: {{ .Values.api-gateway.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.api-gateway.service.targetPort }}
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: {{ .Values.global.environment }}
        - name: LOG_LEVEL
          value: {{ .Values.api-gateway.config.log_level }}
        - name: WORKERS
          value: "{{ .Values.api-gateway.config.workers }}"
        - name: CORS_ORIGINS
          value: {{ .Values.api-gateway.config.cors_origins }}
        - name: POSTGRES_HOST
          value: "{{ include "fraudguard-360.fullname" . }}-postgresql"
        - name: POSTGRES_DB
          value: {{ .Values.postgresql.auth.database }}
        - name: POSTGRES_USER
          value: {{ .Values.postgresql.auth.username }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.auth.existingSecret }}
              key: password
        - name: NEO4J_URI
          value: "bolt://{{ include "fraudguard-360.fullname" . }}-neo4j:{{ .Values.neo4j.services.neo4j.ports.bolt }}"
        - name: NEO4J_USER
          valueFrom:
            secretKeyRef:
              name: fraudguard-neo4j-secret
              key: username
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fraudguard-neo4j-secret
              key: password
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "{{ include "fraudguard-360.fullname" . }}-kafka:9092"
        - name: ML_SERVICE_URL
          value: "http://{{ include "fraudguard-360.fullname" . }}-ml-service:{{ .Values.ml-service.service.port }}"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        resources:
          {{- toYaml .Values.api-gateway.resources | nindent 12 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: temp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache
      volumes:
      - name: temp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fraudguard-360.fullname" . }}-api-gateway
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "fraudguard-360.labels" . | nindent 4 }}
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api-gateway.service.type }}
  ports:
  - port: {{ .Values.api-gateway.service.port }}
    targetPort: {{ .Values.api-gateway.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "fraudguard-360.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/name: api-gateway

{{- if .Values.api-gateway.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "fraudguard-360.fullname" . }}-api-gateway
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "fraudguard-360.labels" . | nindent 4 }}
    app.kubernetes.io/name: api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "fraudguard-360.fullname" . }}-api-gateway
  minReplicas: {{ .Values.api-gateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api-gateway.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.api-gateway.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.api-gateway.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if .Values.api-gateway.autoscaling.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.api-gateway.autoscaling.targetMemoryUtilizationPercentage }}
  {{- end }}
{{- end }}
{{- end }}
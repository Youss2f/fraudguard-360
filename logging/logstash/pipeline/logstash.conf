input {
  beats {
    port => 5000
  }
}

filter {
  # Parse timestamp if present
  if [fraudguard][timestamp] {
    date {
      match => [ "[fraudguard][timestamp]", "ISO8601" ]
    }
  }

  # Extract fraud detection data
  if [fraudguard][detection] {
    mutate {
      add_field => {
        "fraud_score" => "%{[fraudguard][detection][score]}"
        "fraud_type" => "%{[fraudguard][detection][type]}"
        "fraud_severity" => "%{[fraudguard][detection][severity]}"
      }
    }
  }

  # Parse CDR data
  if [message] =~ /CDR.*processed/ {
    grok {
      match => { 
        "message" => "CDR %{DATA:cdr_type} processed: duration=%{NUMBER:call_duration:float}, cost=%{NUMBER:call_cost:float}, fraud_score=%{NUMBER:fraud_score:float}"
      }
    }
  }

  # Extract API request information
  if [container][labels][com.docker.compose.service] == "api-gateway" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:service} - %{GREEDYDATA:log_message}"
      }
    }
    
    if [log_message] =~ /API request/ {
      grok {
        match => { 
          "log_message" => "API request: method=%{WORD:http_method}, path=%{URIPATH:request_path}, status=%{NUMBER:response_status:int}, duration=%{NUMBER:request_duration:float}"
        }
      }
    }
  }

  # ML Service logs processing
  if [container][labels][com.docker.compose.service] == "ml-service" {
    if [message] =~ /Model prediction/ {
      grok {
        match => { 
          "message" => "Model prediction: model=%{DATA:model_name}, accuracy=%{NUMBER:model_accuracy:float}, latency=%{NUMBER:prediction_latency:float}ms"
        }
      }
    }
  }

  # Add service name from container labels
  if [container][labels][com.docker.compose.service] {
    mutate {
      add_field => { "service_name" => "%{[container][labels][com.docker.compose.service]}" }
    }
  }

  # Enrich with geo data for IP addresses
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Add fraud severity level
  if [fraud_score] {
    if [fraud_score] >= 0.8 {
      mutate { add_field => { "fraud_risk" => "high" } }
    } else if [fraud_score] >= 0.5 {
      mutate { add_field => { "fraud_risk" => "medium" } }
    } else {
      mutate { add_field => { "fraud_risk" => "low" } }
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => [ "agent", "input", "ecs" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "fraudguard-logs-%{+YYYY.MM.dd}"
    template_name => "fraudguard"
    template_pattern => "fraudguard-*"
    template => {
      "index_patterns" => ["fraudguard-*"],
      "settings" => {
        "number_of_shards" => 2,
        "number_of_replicas" => 1,
        "index.refresh_interval" => "5s"
      },
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" },
          "service_name" => { "type" => "keyword" },
          "log.level" => { "type" => "keyword" },
          "fraud_score" => { "type" => "float" },
          "fraud_type" => { "type" => "keyword" },
          "fraud_severity" => { "type" => "keyword" },
          "fraud_risk" => { "type" => "keyword" },
          "http_method" => { "type" => "keyword" },
          "request_path" => { "type" => "keyword" },
          "response_status" => { "type" => "integer" },
          "request_duration" => { "type" => "float" },
          "model_name" => { "type" => "keyword" },
          "model_accuracy" => { "type" => "float" },
          "prediction_latency" => { "type" => "float" },
          "call_duration" => { "type" => "float" },
          "call_cost" => { "type" => "float" },
          "cdr_type" => { "type" => "keyword" },
          "geoip" => {
            "properties" => {
              "location" => { "type" => "geo_point" },
              "country_name" => { "type" => "keyword" },
              "city_name" => { "type" => "keyword" }
            }
          }
        }
      }
    }
  }

  # Debug output for development
  if [fields][debug] == "true" {
    stdout { 
      codec => rubydebug 
    }
  }
}
# Logstash configuration for FraudGuard 360
# Processes logs from all services and enriches them for analysis

input {
  # Beats input for collecting logs from all services
  beats {
    port => 5044
  }
  
  # Kafka input for real-time log streaming
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["service-logs", "application-logs", "ml-logs", "fraud-alerts"]
    group_id => "logstash-fraud-detection"
    consumer_threads => 3
    decorate_events => true
  }
  
  # Syslog input for system logs
  syslog {
    port => 5514
  }
  
  # TCP input for direct log shipping
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse timestamp from different log formats
  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "dd/MMM/yyyy:HH:mm:ss Z" ]
    target => "@timestamp"
  }
  
  # Service-specific processing
  if [fields][service] == "api-gateway" {
    # Parse API Gateway logs
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:logger} - %{GREEDYDATA:log_message}"
      }
    }
    
    # Extract HTTP request details
    if [log_message] =~ /HTTP/ {
      grok {
        match => {
          "log_message" => "%{WORD:method} %{URIPATH:path} %{NUMBER:status_code:int} %{NUMBER:response_time:float}ms"
        }
      }
    }
    
    # Add service metadata
    mutate {
      add_field => { "service_type" => "api-gateway" }
      add_field => { "component" => "web-service" }
    }
  }
  
  else if [fields][service] == "ml-service" {
    # Parse ML Service logs
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:logger} - %{GREEDYDATA:log_message}"
      }
    }
    
    # Extract ML-specific metrics
    if [log_message] =~ /prediction/ {
      grok {
        match => {
          "log_message" => "User %{DATA:user_id} - Risk: %{NUMBER:risk_score:float}% - Type: %{DATA:fraud_type}"
        }
      }
      
      mutate {
        add_field => { "log_type" => "ml-prediction" }
      }
    }
    
    # Extract model performance metrics
    if [log_message] =~ /accuracy|precision|recall/ {
      grok {
        match => {
          "log_message" => "%{DATA:model_name} - %{DATA:metric_name}: %{NUMBER:metric_value:float}"
        }
      }
      
      mutate {
        add_field => { "log_type" => "model-metrics" }
      }
    }
    
    # Parse fraud alerts
    if [log_message] =~ /FRAUD ALERT/ {
      grok {
        match => {
          "log_message" => "FRAUD ALERT - %{DATA:alert_level}: User %{DATA:user_id} - %{DATA:fraud_type}"
        }
      }
      
      mutate {
        add_field => { "log_type" => "fraud-alert" }
        add_field => { "alert" => "true" }
      }
    }
    
    mutate {
      add_field => { "service_type" => "ml-service" }
      add_field => { "component" => "machine-learning" }
    }
  }
  
  else if [fields][service] == "flink-jobs" {
    # Parse Flink job logs
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:flink_component} - %{GREEDYDATA:log_message}"
      }
    }
    
    # Extract job metrics
    if [log_message] =~ /processed|throughput/ {
      grok {
        match => {
          "log_message" => "Processed %{NUMBER:records_processed:int} records, throughput: %{NUMBER:throughput:float} records/sec"
        }
      }
      
      mutate {
        add_field => { "log_type" => "job-metrics" }
      }
    }
    
    mutate {
      add_field => { "service_type" => "flink-jobs" }
      add_field => { "component" => "stream-processing" }
    }
  }
  
  else if [fields][service] == "postgres" {
    # Parse PostgreSQL logs
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{DATA:timezone} \[%{NUMBER:pid:int}\] %{LOGLEVEL:level}:  %{GREEDYDATA:log_message}"
      }
    }
    
    # Extract query performance
    if [log_message] =~ /duration/ {
      grok {
        match => {
          "log_message" => "duration: %{NUMBER:query_duration:float} ms  statement: %{GREEDYDATA:sql_query}"
        }
      }
      
      mutate {
        add_field => { "log_type" => "query-performance" }
      }
    }
    
    mutate {
      add_field => { "service_type" => "postgres" }
      add_field => { "component" => "database" }
    }
  }
  
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }
  
  # Enrich with GeoIP for IP addresses
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
  
  # Add fraud detection context
  if [user_id] and [risk_score] {
    if [risk_score] > 80 {
      mutate {
        add_field => { "risk_category" => "high" }
        add_field => { "requires_investigation" => "true" }
      }
    } else if [risk_score] > 60 {
      mutate {
        add_field => { "risk_category" => "medium" }
      }
    } else {
      mutate {
        add_field => { "risk_category" => "low" }
      }
    }
  }
  
  # Add system context
  mutate {
    add_field => { "environment" => "production" }
    add_field => { "system" => "fraudguard-360" }
    add_field => { "processed_at" => "%{+YYYY-MM-dd HH:mm:ss}" }
  }
  
  # Remove unnecessary fields
  mutate {
    remove_field => [ "host", "agent", "ecs", "input", "prospector" ]
  }
}

output {
  # Main Elasticsearch output
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "fraudguard-%{+YYYY.MM.dd}"
    template_name => "fraudguard"
    template => "/usr/share/logstash/templates/fraudguard-template.json"
    template_overwrite => true
  }
  
  # Fraud alerts to dedicated index
  if [log_type] == "fraud-alert" or [alert] == "true" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "fraud-alerts-%{+YYYY.MM.dd}"
    }
    
    # Send critical alerts to Kafka for real-time processing
    if [alert_level] == "CRITICAL" {
      kafka {
        topic_id => "critical-fraud-alerts"
        bootstrap_servers => "kafka:9092"
        codec => json
      }
    }
  }
  
  # ML metrics to time-series index
  if [log_type] == "ml-prediction" or [log_type] == "model-metrics" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "ml-metrics-%{+YYYY.MM.dd}"
    }
  }
  
  # Performance logs to separate index
  if [log_type] == "query-performance" or [log_type] == "job-metrics" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "performance-logs-%{+YYYY.MM.dd}"
    }
  }
  
  # Debug output for development
  if [fields][debug] == "true" {
    stdout {
      codec => rubydebug
    }
  }
}
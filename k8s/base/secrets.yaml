# ==============================================================================
# FraudGuard 360 - Kubernetes Secrets
# Sensitive configuration data (passwords, tokens, etc.)
# NOTE: In production, use external secret management (e.g., Vault, AWS Secrets Manager)
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: fraudguard-secrets
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: fraudguard-360
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: fraudguard-360
type: Opaque
data:
  # Database passwords (base64 encoded)
  # Default: fraudguard_secure_pass (change in production!)
  POSTGRES_PASSWORD: ZnJhdWRndWFyZF9zZWN1cmVfcGFzcw==
  # Default: neo4j_secure_pass (change in production!)
  NEO4J_PASSWORD: bmVvNGpfc2VjdXJlX3Bhc3M=
  
  # JWT Secret Key for API authentication
  # Default: jwt_super_secret_key_change_in_production (change in production!)
  JWT_SECRET_KEY: and0X3N1cGVyX3NlY3JldF9rZXlfY2hhbmdlX2luX3Byb2R1Y3Rpb24=
  
  # Database URLs with credentials
  DATABASE_URL: cG9zdGdyZXNxbDovL2ZyYXVkZ3VhcmQ6ZnJhdWRndWFyZF9zZWN1cmVfcGFzc0Bwb3N0Z3Jlcy1zZXJ2aWNlOjU0MzIvZnJhdWRndWFyZA==

---
# TLS Certificate Secret (for HTTPS in production)
# NOTE: Replace with actual certificates in production
apiVersion: v1
kind: Secret
metadata:
  name: fraudguard-tls
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: fraudguard-360
    app.kubernetes.io/component: tls
    app.kubernetes.io/part-of: fraudguard-360
type: kubernetes.io/tls
data:
  # Self-signed certificate for development (replace in production)
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi4uLgotLS0tLUVORCBDRVJUSUZJQ0FURS0tLS0t
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCi4uLgotLS0tLUVORCBQUklWQVRFIEtFWS0tLS0t

---
# Registry Secret for pulling private Docker images (if needed)
apiVersion: v1
kind: Secret
metadata:
  name: fraudguard-registry
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: fraudguard-360
    app.kubernetes.io/component: registry
    app.kubernetes.io/part-of: fraudguard-360
type: kubernetes.io/dockerconfigjson
data:
  # Docker registry credentials (base64 encoded .dockerconfigjson)
  # Configure your Docker registry credentials here during deployment
  # Example: .dockerconfigjson: <your-base64-encoded-dockerconfig>
  .dockerconfigjson: ""
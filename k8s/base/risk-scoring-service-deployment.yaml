# ==============================================================================
# FraudGuard 360 - Risk Scoring Service Deployment
# Advanced risk assessment algorithms
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-scoring-service
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: risk-scoring-service
    app.kubernetes.io/component: risk-assessment
    app.kubernetes.io/part-of: fraudguard-360
    app.kubernetes.io/version: "2.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: risk-scoring-service
      app.kubernetes.io/component: risk-assessment
  template:
    metadata:
      labels:
        app.kubernetes.io/name: risk-scoring-service
        app.kubernetes.io/component: risk-assessment
        app.kubernetes.io/part-of: fraudguard-360
    spec:
      containers:
      - name: risk-scoring-service
        image: ghcr.io/youss2f/fraudguard-360-risk-scoring-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8002
          name: http
          protocol: TCP
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: connection-string
        - name: LOG_LEVEL
          value: "INFO"
        - name: CACHE_TTL
          value: "300"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: risk-scoring-service
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: risk-scoring-service
    app.kubernetes.io/component: risk-assessment
    app.kubernetes.io/part-of: fraudguard-360
spec:
  type: ClusterIP
  ports:
  - port: 8002
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: risk-scoring-service
    app.kubernetes.io/component: risk-assessment
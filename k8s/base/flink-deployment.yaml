# ==============================================================================
# FraudGuard 360 - Apache Flink Deployment
# Stream processing engine for real-time fraud detection
# ==============================================================================

# Flink JobManager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: flink-jobmanager
    app.kubernetes.io/component: stream-processing
    app.kubernetes.io/part-of: fraudguard-360
    app.kubernetes.io/version: "1.18"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: flink-jobmanager
      app.kubernetes.io/component: stream-processing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink-jobmanager
        app.kubernetes.io/component: stream-processing
        app.kubernetes.io/part-of: fraudguard-360
        app.kubernetes.io/version: "1.18"
    spec:
      securityContext:
        fsGroup: 9999
        runAsUser: 9999
        runAsGroup: 9999
      containers:
      - name: flink-jobmanager
        image: flink:1.18-scala_2.12
        imagePullPolicy: IfNotPresent
        args: ["jobmanager"]
        ports:
        - containerPort: 6123
          name: rpc
        - containerPort: 6124
          name: blob-server
        - containerPort: 8081
          name: webui
        env:
        - name: FLINK_PROPERTIES
          valueFrom:
            configMapKeyRef:
              name: flink-config
              key: flink-conf.yaml
        - name: JOB_MANAGER_RPC_ADDRESS
          value: "flink-jobmanager-service"
        volumeMounts:
        - name: flink-config-volume
          mountPath: /opt/flink/conf/flink-conf.yaml
          subPath: flink-conf.yaml
        - name: flink-storage
          mountPath: /opt/flink/data
        - name: flink-usrlib
          mountPath: /opt/flink/usrlib
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: flink-config-volume
        configMap:
          name: flink-config
      - name: flink-storage
        persistentVolumeClaim:
          claimName: flink-data-pvc
      - name: flink-usrlib
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager-service
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: flink-jobmanager
    app.kubernetes.io/component: stream-processing
    app.kubernetes.io/part-of: fraudguard-360
spec:
  type: ClusterIP
  ports:
  - port: 6123
    targetPort: 6123
    protocol: TCP
    name: rpc
  - port: 6124
    targetPort: 6124
    protocol: TCP
    name: blob-server
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: webui
  selector:
    app.kubernetes.io/name: flink-jobmanager
    app.kubernetes.io/component: stream-processing

---
# Flink TaskManager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: flink-taskmanager
    app.kubernetes.io/component: stream-processing-worker
    app.kubernetes.io/part-of: fraudguard-360
    app.kubernetes.io/version: "1.18"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: flink-taskmanager
      app.kubernetes.io/component: stream-processing-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink-taskmanager
        app.kubernetes.io/component: stream-processing-worker
        app.kubernetes.io/part-of: fraudguard-360
        app.kubernetes.io/version: "1.18"
    spec:
      securityContext:
        fsGroup: 9999
        runAsUser: 9999
        runAsGroup: 9999
      containers:
      - name: flink-taskmanager
        image: flink:1.18-scala_2.12
        imagePullPolicy: IfNotPresent
        args: ["taskmanager"]
        ports:
        - containerPort: 6122
          name: data
        env:
        - name: FLINK_PROPERTIES
          valueFrom:
            configMapKeyRef:
              name: flink-config
              key: flink-conf.yaml
        - name: JOB_MANAGER_RPC_ADDRESS
          value: "flink-jobmanager-service"
        volumeMounts:
        - name: flink-config-volume
          mountPath: /opt/flink/conf/flink-conf.yaml
          subPath: flink-conf.yaml
        - name: flink-storage
          mountPath: /opt/flink/data
        - name: flink-usrlib
          mountPath: /opt/flink/usrlib
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          tcpSocket:
            port: 6122
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 6122
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: flink-config-volume
        configMap:
          name: flink-config
      - name: flink-storage
        persistentVolumeClaim:
          claimName: flink-data-pvc
      - name: flink-usrlib
        emptyDir: {}

---
# Flink TaskManager Service (for internal communication)
apiVersion: v1
kind: Service
metadata:
  name: flink-taskmanager-service
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: flink-taskmanager
    app.kubernetes.io/component: stream-processing-worker
    app.kubernetes.io/part-of: fraudguard-360
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 6122
    targetPort: 6122
    protocol: TCP
    name: data
  selector:
    app.kubernetes.io/name: flink-taskmanager
    app.kubernetes.io/component: stream-processing-worker
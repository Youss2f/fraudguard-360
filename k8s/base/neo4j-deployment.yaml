# ==============================================================================
# FraudGuard 360 - Neo4j Graph Database Deployment
# Graph database for network relationships and fraud pattern analysis
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph-database
    app.kubernetes.io/part-of: fraudguard-360
    app.kubernetes.io/version: "5.13"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
      app.kubernetes.io/component: graph-database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
        app.kubernetes.io/component: graph-database
        app.kubernetes.io/part-of: fraudguard-360
        app.kubernetes.io/version: "5.13"
    spec:
      securityContext:
        fsGroup: 7474
        runAsUser: 7474
        runAsGroup: 7474
      containers:
      - name: neo4j
        image: neo4j:5.13-community
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7474
          name: http
        - containerPort: 7687
          name: bolt
        env:
        - name: NEO4J_AUTH
          valueFrom:
            secretKeyRef:
              name: fraudguard-secrets
              key: NEO4J_PASSWORD
        - name: NEO4J_dbms_security_procedures_unrestricted
          value: "gds.*,apoc.*"
        - name: NEO4J_dbms_security_procedures_allowlist
          value: "gds.*,apoc.*"
        - name: NEO4J_dbms_memory_heap_initial_size
          value: "1G"
        - name: NEO4J_dbms_memory_heap_max_size
          value: "2G"
        - name: NEO4J_dbms_memory_pagecache_size
          value: "1G"
        - name: NEO4J_dbms_logs_debug_level
          value: "INFO"
        - name: NEO4J_dbms_default_listen_address
          value: "0.0.0.0"
        - name: NEO4J_dbms_default_advertised_address
          value: "neo4j-service"
        volumeMounts:
        - name: neo4j-data
          mountPath: /data
        - name: neo4j-logs
          mountPath: /logs
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: neo4j-data
        persistentVolumeClaim:
          claimName: neo4j-data-pvc
      - name: neo4j-logs
        persistentVolumeClaim:
          claimName: neo4j-logs-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-service
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph-database
    app.kubernetes.io/part-of: fraudguard-360
spec:
  type: ClusterIP
  ports:
  - port: 7474
    targetPort: 7474
    protocol: TCP
    name: http
  - port: 7687
    targetPort: 7687
    protocol: TCP
    name: bolt
  selector:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph-database

---
# Neo4j Admin Service (for external access during development)
apiVersion: v1
kind: Service
metadata:
  name: neo4j-admin-service
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph-database-admin
    app.kubernetes.io/part-of: fraudguard-360
  annotations:
    service.beta.kubernetes.io/external-traffic-policy: Local
spec:
  type: NodePort
  ports:
  - port: 7474
    targetPort: 7474
    protocol: TCP
    name: http
    nodePort: 30474
  - port: 7687
    targetPort: 7687
    protocol: TCP
    name: bolt
    nodePort: 30687
  selector:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph-database
# ==============================================================================
# FraudGuard 360 - Core ML Service Deployment
# GraphSAGE-based fraud detection inference service
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-ml-service
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: core-ml-service
    app.kubernetes.io/component: ml-inference
    app.kubernetes.io/part-of: fraudguard-360
    app.kubernetes.io/version: "2.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: core-ml-service
      app.kubernetes.io/component: ml-inference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: core-ml-service
        app.kubernetes.io/component: ml-inference
        app.kubernetes.io/part-of: fraudguard-360
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8001"
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: ml-service
        image: fraudguard/ml-service:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
          name: http
          protocol: TCP
        env:
        - name: PYTHONPATH
          valueFrom:
            configMapKeyRef:
              name: fraudguard-config
              key: PYTHONPATH
        - name: MODEL_PATH
          valueFrom:
            configMapKeyRef:
              name: fraudguard-config
              key: MODEL_PATH
        - name: NEO4J_URI
          valueFrom:
            configMapKeyRef:
              name: fraudguard-config
              key: NEO4J_URI
        - name: NEO4J_USER
          valueFrom:
            configMapKeyRef:
              name: fraudguard-config
              key: NEO4J_USER
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fraudguard-secrets
              key: NEO4J_PASSWORD
        - name: OMP_NUM_THREADS
          value: "2"
        - name: MKL_NUM_THREADS
          value: "2"
        - name: NUMEXPR_NUM_THREADS
          value: "2"
        volumeMounts:
        - name: ml-models
          mountPath: /app/models
        - name: tmp-volume
          mountPath: /tmp
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        startupProbe:
          httpGet:
            path: /health
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
          successThreshold: 1
      volumes:
      - name: ml-models
        persistentVolumeClaim:
          claimName: ml-models-pvc
      - name: tmp-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: ml-service
    app.kubernetes.io/component: ml-inference
    app.kubernetes.io/part-of: fraudguard-360
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8001"
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: ml-service
    app.kubernetes.io/component: ml-inference

---
# Horizontal Pod Autoscaler for ML Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-service-hpa
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: ml-service
    app.kubernetes.io/component: autoscaler
    app.kubernetes.io/part-of: fraudguard-360
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
# ==============================================================================
# FraudGuard 360 - Persistent Volume Claims
# Storage for databases and stateful services
# ==============================================================================

# PostgreSQL Persistent Volume Claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: fraudguard-360
    app.kubernetes.io/component: postgres-storage
    app.kubernetes.io/part-of: fraudguard-360
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard


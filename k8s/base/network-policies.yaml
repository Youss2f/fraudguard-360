# ==============================================================================
# FraudGuard 360 - Network Policies
# Comprehensive security isolation and traffic control
# ==============================================================================

# Default Deny All Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: default-deny-all
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: fraudguard-360
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Frontend Access Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: frontend-network-policy
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: fraudguard-360
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress traffic
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  # Allow API Gateway communication
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: api-gateway
    ports:
    - protocol: TCP
      port: 3000
  egress:
  # Allow API Gateway communication
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: api-gateway
    ports:
    - protocol: TCP
      port: 8000
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53

---
# API Gateway Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-network-policy
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: api-gateway-network-policy
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: fraudguard-360
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress traffic
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  # Allow frontend communication
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: frontend
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Allow ML Service communication
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ml-service
    ports:
    - protocol: TCP
      port: 8001
  # Allow PostgreSQL access
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgresql
    ports:
    - protocol: TCP
      port: 5432
  # Allow Neo4j access
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: neo4j
    ports:
    - protocol: TCP
      port: 7687
  # Allow Kafka access
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: kafka
    ports:
    - protocol: TCP
      port: 9092
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53


---
# Flink Cluster Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flink-network-policy
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: flink-network-policy
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: fraudguard-360
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: flink
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow Flink internal communication
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: flink
  # Allow admin access to JobManager UI
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8081
  egress:
  # Allow Flink internal communication
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: flink
  # Allow Kafka access
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: kafka
    ports:
    - protocol: TCP
      port: 9092
  # Allow Neo4j access
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: neo4j
    ports:
    - protocol: TCP
      port: 7687
  # Allow ML Service access
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ml-service
    ports:
    - protocol: TCP
      port: 8001
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
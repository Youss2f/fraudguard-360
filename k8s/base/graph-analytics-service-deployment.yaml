# ==============================================================================
# FraudGuard 360 - Graph Analytics Service Deployment
# Neo4j-powered fraud network analysis
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-analytics-service
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: graph-analytics-service
    app.kubernetes.io/component: graph-analysis
    app.kubernetes.io/part-of: fraudguard-360
    app.kubernetes.io/version: "2.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: graph-analytics-service
      app.kubernetes.io/component: graph-analysis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graph-analytics-service
        app.kubernetes.io/component: graph-analysis
        app.kubernetes.io/part-of: fraudguard-360
    spec:
      containers:
      - name: graph-analytics-service
        image: ghcr.io/youss2f/fraudguard-360-graph-analytics-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8003
          name: http
          protocol: TCP
        env:
        - name: NEO4J_URI
          value: "bolt://neo4j-service:7687"
        - name: NEO4J_USER
          valueFrom:
            secretKeyRef:
              name: neo4j-secret
              key: username
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: neo4j-secret
              key: password
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: LOG_LEVEL
          value: "INFO"
        - name: CACHE_TTL
          value: "600"
        resources:
          requests:
            memory: "768Mi"
            cpu: "300m"
          limits:
            memory: "1.5Gi"
            cpu: "750m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: graph-analytics-service
  namespace: fraudguard
  labels:
    app.kubernetes.io/name: graph-analytics-service
    app.kubernetes.io/component: graph-analysis
    app.kubernetes.io/part-of: fraudguard-360
spec:
  type: ClusterIP
  ports:
  - port: 8003
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: graph-analytics-service
    app.kubernetes.io/component: graph-analysis